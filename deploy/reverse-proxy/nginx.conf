# Lichess Kids Nginx Configuration Template
# Place in /etc/nginx/sites-available/lichesskids and symlink to sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name lichesskids.example.com;

    # ACME Challenge for SSL Certificates (Let's Encrypt / Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lichesskids.example.com;

    # SSL Certificates (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/lichesskids.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lichesskids.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:64355;
        proxy_http_version 1.1;
        
        # Connection headers (critical for dynamic absolute URL builders)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
