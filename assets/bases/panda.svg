<svg viewBox="0 0 200 200" width="100%" height="100%">
            <!-- Body -->
            <path d="M 60 180 C 60 145, 140 145, 140 180 Z" fill="#212529" stroke="#000000" stroke-width="3" />
            <!-- Ears -->
            <circle cx="65" cy="65" r="18" fill="#212529" stroke="#000000" stroke-width="3" />
            <circle cx="65" cy="65" r="10" fill="#f1f3f5" />
            <circle cx="135" cy="65" r="18" fill="#212529" stroke="#000000" stroke-width="3" />
            <circle cx="135" cy="65" r="10" fill="#f1f3f5" />
            <!-- Head -->
            <circle cx="100" cy="100" r="50" fill="#f8f9fa" stroke="#adb5bd" stroke-width="3" />
            <!-- Eye Patches (Black) -->
            <ellipse cx="80" cy="95" rx="14" ry="10" fill="#212529" transform="rotate(-15 80 95)" />
            <ellipse cx="120" cy="95" rx="14" ry="10" fill="#212529" transform="rotate(15 120 95)" />
            <!-- Eyes (White + Pupil) -->
            <circle cx="82" cy="95" r="5" fill="#fff" />
            <circle cx="82" cy="95" r="2.5" fill="#000" />
            <circle cx="118" cy="95" r="5" fill="#fff" />
            <circle cx="118" cy="95" r="2.5" fill="#000" />
            <!-- Snout & Nose -->
            <ellipse cx="100" cy="115" rx="8" ry="5" fill="#212529" />
            <!-- Smile -->
            <path d="M 94 122 Q 100 127 106 122" fill="none" stroke="#212529" stroke-width="2" stroke-linecap="round" />
        </svg>