<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Avatar - Lichess Kids</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="select-avatar-container">
        <div class="glass-panel" style="margin: 40px auto; max-width: 600px;">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Choose Your Avatar!</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">
                Welcome to Lichess Kids! Pick your base character to start your adventure. You can customize them with clothes, hats, and accessories later!
            </p>

            <div class="avatar-grid"></div>

            <button id="submit-avatar-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 14px;" disabled>
                Let's Play!
            </button>
        </div>
    </div>

    <script type="module">
        import { renderAvatar, initAssets } from '/static/avatar-renderer.js?v=2';

        // Load catalog and init assets
        const catalogRes = await fetch('/api/assets/catalog');
        const catalog = await catalogRes.json();
        initAssets(catalog);

        const grid = document.querySelector('.avatar-grid');
        grid.innerHTML = '';
        
        catalog.bases.forEach(base => {
            const card = document.createElement('div');
            card.className = 'avatar-select-card';
            card.dataset.base = base.id;
            
            const iconDiv = document.createElement('div');
            iconDiv.id = `svg-${base.id}`;
            iconDiv.className = 'avatar-select-icon';
            card.appendChild(iconDiv);
            
            const title = document.createElement('h4');
            title.style.marginTop = '10px';
            title.textContent = base.name;
            card.appendChild(title);
            
            grid.appendChild(card);
            
            // Render this base
            renderAvatar(iconDiv, base.id);
        });

        let selectedAvatar = null;
        const submitBtn = document.getElementById('submit-avatar-btn');

        grid.addEventListener('click', (e) => {
            const card = e.target.closest('.avatar-select-card');
            if (!card) return;
            
            document.querySelectorAll('.avatar-select-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedAvatar = card.dataset.base;
            submitBtn.disabled = false;
        });

        submitBtn.addEventListener('click', async () => {
            if (!selectedAvatar) return;

            try {
                // Real OAuth complete registration
                const res = await fetch('/api/select-avatar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ avatar_base: selectedAvatar })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard.html';
                } else {
                    alert(data.error || 'Failed to select avatar');
                }
            } catch (err) {
                console.error(err);
                alert('Error connecting to local server');
            }
        });
    </script>
</body>
</html>
