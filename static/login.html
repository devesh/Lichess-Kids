<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Lichess Kids</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-container">
        <div class="glass-panel" style="padding: 10px; overflow: hidden; border-radius: 20px;">
            <img src="/static/assets/banner.jpg" alt="Lichess Kids Banner" style="width: 100%; border-radius: 12px; display: block;">
        </div>

        <div class="glass-panel">
            <h1 style="margin-bottom: 10px;">Lichess Kids</h1>
            <p style="color: var(--text-secondary); margin-bottom: 25px; font-size: 1.1rem; line-height: 1.6;">
                Earn spins by winning games against tougher opponents and solving puzzles on Lichess! Spin the chess wheel to win coins, buy cute avatar accessories, dress up your character, and make friends!
            </p>

            <button id="oauth-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px; margin-bottom: 20px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg>
                Log In with Lichess Account
            </button>
            <div id="error-message" style="color: var(--error); margin-top: 15px; font-weight: 600; font-size: 0.95rem; display: none;"></div>
        </div>
    </div>

    <script>
        // Check url params for errors
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.innerText = `Login failed: ${error.replace(/_/g, ' ')}`;
            errorDiv.style.display = 'block';
        }

        // Real Lichess OAuth Login flow
        document.getElementById('oauth-btn').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/oauth/start', { method: 'POST' });
                const data = await res.json();
                if (data.auth_url) {
                    window.location.href = data.auth_url;
                } else {
                    alert('Failed to initiate Lichess Login');
                }
            } catch (err) {
                console.error(err);
                alert('Error starting Lichess OAuth flow');
            }
        });
    </script>
</body>
</html>
